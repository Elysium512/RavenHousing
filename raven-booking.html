<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raven — Book Your Appointment</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        raven: {
          dark:   '#0d0d0d',
          card:   '#1a1a1a',
          border: '#2a2a2a',
          accent: '#e8b84b',
          muted:  '#6b6b6b',
        }
      }}}
    }
  </script>
  <style>
    body { background: #0d0d0d; font-family: 'Segoe UI', system-ui, sans-serif; color: #f0f0f0; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; }
    .input-field {
      background: #111; border: 1px solid #333; color: #f0f0f0;
      border-radius: 0.5rem; padding: 0.75rem 1rem; width: 100%;
      transition: border-color 0.15s;
    }
    .input-field:focus { outline: none; border-color: #e8b84b; }
    .btn-primary {
      background: #e8b84b; color: #0d0d0d; font-weight: 700;
      border-radius: 0.5rem; padding: 0.75rem 2rem; cursor: pointer;
      border: none; transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-secondary {
      background: #2a2a2a; color: #f0f0f0; font-weight: 600;
      border-radius: 0.5rem; padding: 0.75rem 1.5rem; cursor: pointer;
      border: 1px solid #3a3a3a; transition: background 0.15s;
    }
    .btn-secondary:hover { background: #333; }
    .slot-card {
      background: #111; border: 1px solid #2a2a2a; border-radius: 0.75rem;
      padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .slot-card:hover { border-color: #e8b84b; background: #181808; }
    .slot-card.selected { border-color: #e8b84b; background: #1c1800; }
    .badge-status {
      display: inline-block; border-radius: 9999px; font-size: 0.75rem; font-weight: 600;
      padding: 0.2rem 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-pending   { background: #1f2d1f; color: #4ade80; border: 1px solid #166534; }
    .badge-scheduled { background: #1f1f2d; color: #818cf8; border: 1px solid #3730a3; }
    .badge-completed { background: #2d2d2d; color: #9ca3af; border: 1px solid #4b5563; }
    .badge-cancelled { background: #2d1f1f; color: #f87171; border: 1px solid #991b1b; }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

    /* ⚠️  SECURITY NOTE
       This file calls the ServiceM8 API directly from the browser.
       The API key below is visible in page source to anyone who opens DevTools.
       For a public customer portal, route all API calls through a serverless
       function (Cloudflare Worker, Netlify Function, etc.) that holds the key
       server-side.  This is fine for internal / controlled-access use.
    */
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── CONFIG ─────────────────────────────────────────────────────────────────
// URL of your deployed Cloudflare Worker proxy (see proxy-worker.js for deploy steps)
// e.g. 'https://raven-sm8-proxy.yourname.workers.dev'
const PROXY_BASE = 'https://calm-fog-ef62.peter-c72.workers.dev';

// Only show jobs belonging to this client
const RAVEN_COMPANY_UUID = '11fa4f27-5ce1-465c-8677-2431c46bdc3b';

// How many days ahead to offer as available slots
const DAYS_AHEAD = 14;

// Working hours for slot generation (24h)
const SLOT_START_HOUR = 8;
const SLOT_END_HOUR   = 17;
const SLOT_DURATION_H = 2; // 2-hour appointment windows
// ─────────────────────────────────────────────────────────────────────────────

async function sm8Get(path) {
  const res = await fetch(PROXY_BASE + path, {
    headers: { 'Accept': 'application/json' },
  });
  if (!res.ok) throw new Error(`ServiceM8 error ${res.status}: ${await res.text()}`);
  return res.json();
}

async function sm8Put(path, body) {
  const res = await fetch(PROXY_BASE + path, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`ServiceM8 error ${res.status}: ${await res.text()}`);
  return res.json();
}

// Normalise a UK postcode — uppercase, strip all spaces, then re-insert canonical space
function normalisePostcode(raw) {
  const s = raw.replace(/\s/g, '').toUpperCase();
  if (s.length < 5) return s;
  return s.slice(0, -3) + ' ' + s.slice(-3);
}

function normalisePhone(raw) {
  return raw.replace(/[\s\-().+]/g, '');
}

// Match a job against the user's search terms
function jobMatches(job, { postcode, houseNumber, phone }) {
  const addr = (job.job_address || '').toLowerCase();
  const clientPhone = normalisePhone(job.contact_phone || '');

  if (phone) {
    const needle = normalisePhone(phone);
    if (clientPhone.includes(needle) || normalisePhone(job.contact_mobile || '').includes(needle)) return true;
  }

  if (postcode && houseNumber) {
    const normPC = normalisePostcode(postcode).toLowerCase();
    const normHN = houseNumber.trim().toLowerCase();
    return addr.includes(normPC) && addr.includes(normHN);
  }

  if (postcode) return addr.includes(normalisePostcode(postcode).toLowerCase());
  return false;
}

function statusLabel(status) {
  const map = {
    'Quote': 'Quote',
    'Work Order': 'Scheduled',
    'Completed': 'Completed',
    'Cancelled': 'Cancelled',
    'Unsuccessful': 'Unsuccessful',
  };
  return map[status] || status || 'Unknown';
}

function statusBadgeClass(status) {
  if (status === 'Work Order') return 'badge-scheduled';
  if (status === 'Completed')  return 'badge-completed';
  if (status === 'Cancelled' || status === 'Unsuccessful') return 'badge-cancelled';
  return 'badge-pending';
}

// Generate AM/PM slot labels for a given date
function generateSlots(date) {
  const slots = [];
  for (let h = SLOT_START_HOUR; h < SLOT_END_HOUR; h += SLOT_DURATION_H) {
    const from = `${h.toString().padStart(2,'0')}:00`;
    const to   = `${(h + SLOT_DURATION_H).toString().padStart(2,'0')}:00`;
    slots.push({ label: `${from} – ${to}`, start: from, end: to });
  }
  return slots;
}

// Next N working days (Mon–Fri)
function getAvailableDays(n) {
  const days = [];
  const d = new Date();
  d.setDate(d.getDate() + 1); // start tomorrow
  while (days.length < n) {
    if (d.getDay() !== 0 && d.getDay() !== 6) days.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return days;
}

function fmt(date) {
  return date.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

function fmtShort(date) {
  return date.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
}

// ─── STEP COMPONENTS ─────────────────────────────────────────────────────────

function StepLookup({ onFound }) {
  const [mode, setMode]         = useState('address'); // 'address' | 'phone'
  const [postcode, setPostcode] = useState('');
  const [houseNo, setHouseNo]   = useState('');
  const [phone, setPhone]       = useState('');
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');

  async function handleSearch(e) {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      // ServiceM8 doesn't support OR — fetch Work Orders and Quotes separately then merge
      const base = `/job.json?%24filter=company_uuid%20eq%20%27${RAVEN_COMPANY_UUID}%27%20and%20status%20eq%20`;
      const [workOrders, quotes] = await Promise.all([
        sm8Get(base + `%27Work%20Order%27`),
        sm8Get(base + `%27Quote%27`),
      ]);
      const jobs = [...workOrders, ...quotes];
      const criteria = mode === 'phone'
        ? { phone }
        : { postcode, houseNumber: houseNo, phone: '' };

      const matched = jobs.filter(j => jobMatches(j, criteria));

      if (matched.length === 0) {
        setError('No upcoming jobs found for those details. Please check your information or call us on 01234 567890.');
      } else {
        onFound(matched);
      }
    } catch (err) {
      setError('Could not connect to our booking system. Please try again or call us.');
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="card rounded-2xl p-8 w-full max-w-md mx-auto shadow-xl">
      <h2 className="text-xl font-bold mb-1">Find your appointment</h2>
      <p className="text-sm text-gray-400 mb-6">Enter your address details or phone number to look up your job.</p>

      <div className="flex gap-2 mb-6">
        <button
          className={`flex-1 py-2 rounded-lg text-sm font-semibold transition-colors ${mode === 'address' ? 'bg-raven-accent text-black' : 'bg-raven-border text-gray-300 hover:bg-gray-700'}`}
          onClick={() => setMode('address')}
        >Address</button>
        <button
          className={`flex-1 py-2 rounded-lg text-sm font-semibold transition-colors ${mode === 'phone' ? 'bg-raven-accent text-black' : 'bg-raven-border text-gray-300 hover:bg-gray-700'}`}
          onClick={() => setMode('phone')}
        >Phone number</button>
      </div>

      <form onSubmit={handleSearch}>
        {mode === 'address' ? (
          <>
            <div className="mb-4">
              <label className="block text-sm text-gray-400 mb-1">House number / name</label>
              <input
                className="input-field"
                placeholder="e.g. 14 or Rose Cottage"
                value={houseNo}
                onChange={e => setHouseNo(e.target.value)}
                required
              />
            </div>
            <div className="mb-6">
              <label className="block text-sm text-gray-400 mb-1">Postcode</label>
              <input
                className="input-field"
                placeholder="e.g. PO19 1AB"
                value={postcode}
                onChange={e => setPostcode(e.target.value)}
                required
              />
            </div>
          </>
        ) : (
          <div className="mb-6">
            <label className="block text-sm text-gray-400 mb-1">Phone number</label>
            <input
              className="input-field"
              type="tel"
              placeholder="e.g. 07700 900123"
              value={phone}
              onChange={e => setPhone(e.target.value)}
              required
            />
          </div>
        )}

        {error && (
          <div className="mb-4 p-3 rounded-lg bg-red-950 border border-red-800 text-red-300 text-sm">{error}</div>
        )}

        <button className="btn-primary w-full" type="submit" disabled={loading}>
          {loading ? 'Searching…' : 'Find my appointment'}
        </button>
      </form>
    </div>
  );
}

function StepSelectJob({ jobs, onSelect, onBack }) {
  return (
    <div className="card rounded-2xl p-8 w-full max-w-lg mx-auto shadow-xl">
      <button className="text-sm text-gray-500 hover:text-gray-300 mb-4 flex items-center gap-1" onClick={onBack}>
        ← Back
      </button>
      <h2 className="text-xl font-bold mb-1">We found {jobs.length} job{jobs.length > 1 ? 's' : ''}</h2>
      <p className="text-sm text-gray-400 mb-5">Select the appointment you'd like to book.</p>
      <div className="space-y-3">
        {jobs.map(job => (
          <button
            key={job.uuid}
            className="w-full text-left slot-card"
            onClick={() => onSelect(job)}
          >
            <div className="flex items-start justify-between gap-3">
              <div className="min-w-0">
                <p className="font-semibold text-sm truncate">{job.job_address || 'No address'}</p>
                <p className="text-xs text-gray-400 mt-0.5 truncate">{job.type || job.job_description || 'Job #' + job.generated_job_id}</p>
                {job.start_date && (
                  <p className="text-xs text-gray-500 mt-1">Current date: {new Date(job.start_date).toLocaleDateString('en-GB')}</p>
                )}
              </div>
              <span className={`badge-status flex-shrink-0 ${statusBadgeClass(job.status)}`}>
                {statusLabel(job.status)}
              </span>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

function StepJobDetail({ job, onBook, onBack }) {
  const canBook = job.status === 'Work Order' || job.status === 'Quote';
  return (
    <div className="card rounded-2xl p-8 w-full max-w-lg mx-auto shadow-xl">
      <button className="text-sm text-gray-500 hover:text-gray-300 mb-4 flex items-center gap-1" onClick={onBack}>
        ← Back
      </button>
      <div className="flex items-start justify-between gap-3 mb-5">
        <h2 className="text-xl font-bold leading-tight">Your appointment</h2>
        <span className={`badge-status flex-shrink-0 ${statusBadgeClass(job.status)}`}>
          {statusLabel(job.status)}
        </span>
      </div>

      <dl className="space-y-3 text-sm mb-6">
        <Row label="Address"    value={job.job_address || '—'} />
        <Row label="Job type"   value={job.type || job.job_description || '—'} />
        <Row label="Reference"  value={job.generated_job_id || job.uuid?.slice(0,8) || '—'} />
        {job.start_date && (
          <Row label="Current date" value={new Date(job.start_date).toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' })} />
        )}
        {job.start_time && <Row label="Time" value={job.start_time} />}
        {job.staff_assigned_to_uuid && <Row label="Technician" value="Assigned — see confirmation" />}
      </dl>

      {canBook ? (
        <>
          <p className="text-sm text-gray-400 mb-4">Choose a convenient time slot below and we'll confirm your appointment.</p>
          <button className="btn-primary w-full" onClick={onBook}>Choose a time slot →</button>
        </>
      ) : (
        <div className="p-3 rounded-lg bg-gray-900 border border-gray-700 text-gray-400 text-sm">
          This appointment is {statusLabel(job.status).toLowerCase()} and cannot be rescheduled online.
          Please call us if you need to make changes.
        </div>
      )}
    </div>
  );
}

function Row({ label, value }) {
  return (
    <div className="flex gap-3">
      <dt className="text-gray-500 w-28 flex-shrink-0">{label}</dt>
      <dd className="text-gray-100">{value}</dd>
    </div>
  );
}

function StepSelectSlot({ job, onConfirm, onBack }) {
  const days  = getAvailableDays(DAYS_AHEAD);
  const [selectedDay,  setSelectedDay]  = useState(null);
  const [selectedSlot, setSelectedSlot] = useState(null);

  function handleDayClick(day) {
    setSelectedDay(day);
    setSelectedSlot(null);
  }

  function handleConfirm() {
    if (!selectedDay || !selectedSlot) return;
    onConfirm({ day: selectedDay, slot: selectedSlot });
  }

  return (
    <div className="card rounded-2xl p-8 w-full max-w-2xl mx-auto shadow-xl">
      <button className="text-sm text-gray-500 hover:text-gray-300 mb-4 flex items-center gap-1" onClick={onBack}>
        ← Back
      </button>
      <h2 className="text-xl font-bold mb-1">Choose a time slot</h2>
      <p className="text-sm text-gray-400 mb-6">Select a day and time that works for you.</p>

      {/* Day picker */}
      <div className="grid grid-cols-3 sm:grid-cols-5 gap-2 mb-6">
        {days.map((d, i) => {
          const active = selectedDay && d.toDateString() === selectedDay.toDateString();
          return (
            <button
              key={i}
              className={`slot-card text-center py-3 px-1 ${active ? 'selected' : ''}`}
              onClick={() => handleDayClick(d)}
            >
              <div className="text-xs text-gray-500">{d.toLocaleDateString('en-GB', { weekday:'short' })}</div>
              <div className="font-bold text-lg leading-tight">{d.getDate()}</div>
              <div className="text-xs text-gray-400">{d.toLocaleDateString('en-GB', { month:'short' })}</div>
            </button>
          );
        })}
      </div>

      {/* Slot picker */}
      {selectedDay && (
        <>
          <p className="text-sm text-gray-400 mb-3">Available slots for {fmtShort(selectedDay)}:</p>
          <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 mb-6">
            {generateSlots(selectedDay).map((slot, i) => {
              const active = selectedSlot && selectedSlot.label === slot.label;
              return (
                <button
                  key={i}
                  className={`slot-card text-center py-3 ${active ? 'selected' : ''}`}
                  onClick={() => setSelectedSlot(slot)}
                >
                  <span className="font-semibold text-sm">{slot.label}</span>
                </button>
              );
            })}
          </div>
        </>
      )}

      {selectedDay && selectedSlot && (
        <div className="p-4 rounded-xl bg-yellow-950 border border-yellow-800 mb-5 text-sm">
          <span className="text-yellow-400 font-semibold">Selected: </span>
          <span className="text-yellow-100">{fmt(selectedDay)}, {selectedSlot.label}</span>
        </div>
      )}

      <button
        className="btn-primary w-full"
        disabled={!selectedDay || !selectedSlot}
        onClick={handleConfirm}
      >
        Confirm this slot →
      </button>
    </div>
  );
}

function StepConfirm({ job, day, slot, onDone, onBack }) {
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState('');

  async function handleConfirm() {
    setLoading(true);
    setError('');
    try {
      // Format date as YYYY-MM-DD for ServiceM8
      const yyyy = day.getFullYear();
      const mm   = String(day.getMonth() + 1).padStart(2, '0');
      const dd   = String(day.getDate()).padStart(2, '0');
      const dateStr = `${yyyy}-${mm}-${dd}`;

      await sm8Put(`/job/${job.uuid}.json`, {
        start_date: dateStr,
        start_time: slot.start + ':00',
        end_time:   slot.end   + ':00',
        // Optionally set status to Work Order if it was a Quote
        ...(job.status === 'Quote' ? { status: 'Work Order' } : {}),
      });
      onDone();
    } catch (err) {
      setError('We couldn\'t update your appointment. Please call us to confirm your slot.');
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="card rounded-2xl p-8 w-full max-w-md mx-auto shadow-xl">
      <button className="text-sm text-gray-500 hover:text-gray-300 mb-4 flex items-center gap-1" onClick={onBack}>
        ← Back
      </button>
      <h2 className="text-xl font-bold mb-5">Confirm your booking</h2>

      <dl className="space-y-3 text-sm mb-6">
        <Row label="Address"  value={job.job_address || '—'} />
        <Row label="Job type" value={job.type || job.job_description || '—'} />
        <Row label="Date"     value={fmt(day)} />
        <Row label="Time"     value={slot.label} />
      </dl>

      <p className="text-xs text-gray-500 mb-5">
        By confirming, you're requesting this time slot. We'll contact you to confirm if needed.
      </p>

      {error && (
        <div className="mb-4 p-3 rounded-lg bg-red-950 border border-red-800 text-red-300 text-sm">{error}</div>
      )}

      <button className="btn-primary w-full" onClick={handleConfirm} disabled={loading}>
        {loading ? 'Saving…' : 'Confirm booking'}
      </button>
    </div>
  );
}

function StepSuccess({ job, day, slot }) {
  return (
    <div className="card rounded-2xl p-10 w-full max-w-md mx-auto shadow-xl text-center">
      <div className="text-5xl mb-4">✓</div>
      <h2 className="text-2xl font-bold mb-2 text-yellow-400">Booking confirmed</h2>
      <p className="text-gray-400 text-sm mb-6">
        Your appointment has been updated. We'll be in touch to confirm everything.
      </p>
      <dl className="space-y-3 text-sm text-left mb-8">
        <Row label="Address"  value={job.job_address || '—'} />
        <Row label="Date"     value={fmt(day)} />
        <Row label="Time"     value={slot.label} />
      </dl>
      <p className="text-xs text-gray-600">
        Need to make changes? Call us on <span className="text-gray-400">01234 567890</span>.
      </p>
    </div>
  );
}

// ─── MAIN APP ────────────────────────────────────────────────────────────────

const STEPS = ['lookup', 'select-job', 'job-detail', 'select-slot', 'confirm', 'success'];

function App() {
  const [step,    setStep]    = useState('lookup');
  const [jobs,    setJobs]    = useState([]);
  const [job,     setJob]     = useState(null);
  const [booking, setBooking] = useState({ day: null, slot: null });

  return (
    <div className="min-h-screen flex flex-col">
      {/* Header */}
      <header className="border-b border-raven-border px-6 py-4 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-full bg-raven-accent flex items-center justify-center text-black font-bold text-sm">R</div>
          <span className="font-bold text-base tracking-wide">Raven</span>
          <span className="text-gray-600 text-sm hidden sm:inline">· Book your appointment</span>
        </div>
        <span className="text-xs text-gray-600">Powered by Integrum</span>
      </header>

      {/* Progress dots */}
      {step !== 'success' && (
        <div className="flex items-center justify-center gap-2 py-5">
          {['lookup','job-detail','select-slot','confirm'].map((s, i) => {
            const stepIdx = ['lookup','select-job','job-detail','select-slot','confirm','success'];
            const current = stepIdx.indexOf(step);
            const me      = ['lookup','job-detail','select-slot','confirm'].indexOf(s);
            const done    = current > stepIdx.indexOf(s);
            const active  = step === s || (s === 'lookup' && step === 'select-job') || (s === 'job-detail' && step === 'select-job');
            return (
              <div key={s} className="flex items-center gap-2">
                <div className={`w-2.5 h-2.5 rounded-full transition-colors ${done ? 'bg-yellow-400' : active ? 'bg-yellow-500' : 'bg-gray-700'}`} />
                {i < 3 && <div className="w-6 h-px bg-gray-800" />}
              </div>
            );
          })}
        </div>
      )}

      {/* Main content */}
      <main className="flex-1 flex items-start justify-center px-4 py-6">
        {step === 'lookup' && (
          <StepLookup
            onFound={found => {
              setJobs(found);
              if (found.length === 1) {
                setJob(found[0]);
                setStep('job-detail');
              } else {
                setStep('select-job');
              }
            }}
          />
        )}

        {step === 'select-job' && (
          <StepSelectJob
            jobs={jobs}
            onSelect={j => { setJob(j); setStep('job-detail'); }}
            onBack={() => setStep('lookup')}
          />
        )}

        {step === 'job-detail' && (
          <StepJobDetail
            job={job}
            onBook={() => setStep('select-slot')}
            onBack={() => jobs.length > 1 ? setStep('select-job') : setStep('lookup')}
          />
        )}

        {step === 'select-slot' && (
          <StepSelectSlot
            job={job}
            onConfirm={({ day, slot }) => { setBooking({ day, slot }); setStep('confirm'); }}
            onBack={() => setStep('job-detail')}
          />
        )}

        {step === 'confirm' && (
          <StepConfirm
            job={job}
            day={booking.day}
            slot={booking.slot}
            onDone={() => setStep('success')}
            onBack={() => setStep('select-slot')}
          />
        )}

        {step === 'success' && (
          <StepSuccess job={job} day={booking.day} slot={booking.slot} />
        )}
      </main>

      <footer className="text-center text-xs text-gray-700 py-4 border-t border-raven-border">
        Having trouble? Call us on <span className="text-gray-500">01234 567890</span> — we're happy to help.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
