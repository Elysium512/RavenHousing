<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Integrum Services — Book Your Appointment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        ig: {
          red:    '#cc0000',
          redhov: '#aa0000',
          black:  '#111111',
          card:   '#1c1c1c',

  <style>
    *, body { font-family: 'Barlow', system-ui, sans-serif; }
    body { background: #111111; color: #f0f0f0; }

    /* Header red bar accent */
    .header-bar { background: #cc0000; height: 4px; }

    .card { background: #1c1c1c; border: 1px solid #2e2e2e; }

    .input-field {
      background: #151515; border: 1px solid #333; color: #f0f0f0;
      border-radius: 0.375rem; padding: 0.75rem 1rem; width: 100%;
      transition: border-color 0.15s; font-size: 0.95rem;
    }
    .input-field:focus { outline: none; border-color: #cc0000; box-shadow: 0 0 0 2px rgba(204,0,0,0.15); }
    .input-field::placeholder { color: #555; }

    .btn-primary {
      background: #cc0000; color: #fff; font-weight: 700; letter-spacing: 0.03em;
      border-radius: 0.375rem; padding: 0.8rem 2rem; cursor: pointer;
      border: none; transition: background 0.15s; font-size: 0.95rem; text-transform: uppercase;
    }
    .btn-primary:hover { background: #aa0000; }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-outline {
      background: transparent; color: #fff; font-weight: 600;
      border-radius: 0.375rem; padding: 0.8rem 1.5rem; cursor: pointer;
      border: 1px solid #cc0000; transition: background 0.15s; font-size: 0.9rem;
    }
    .btn-outline:hover { background: rgba(204,0,0,0.1); }

    .tab-btn {
      flex: 1; padding: 0.6rem 1rem; font-weight: 600; font-size: 0.875rem;
      border-radius: 0.25rem; transition: all 0.15s; border: 1px solid transparent;
      cursor: pointer; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .tab-active   { background: #cc0000; color: #fff; border-color: #cc0000; }
    .tab-inactive { background: transparent; color: #888; border-color: #333; }
    .tab-inactive:hover { color: #fff; border-color: #555; }

    .slot-card {
      background: #151515; border: 1px solid #2e2e2e; border-radius: 0.5rem;
      padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    }
    .slot-card:hover   { border-color: #cc0000; background: #1a0a0a; }
    .slot-card.selected { border-color: #cc0000; background: #200000; }

    .badge-status {
      display: inline-block; border-radius: 0.25rem; font-size: 0.7rem; font-weight: 700;
      padding: 0.2rem 0.6rem; text-transform: uppercase; letter-spacing: 0.07em;
    }
    .badge-pending   { background: #0d2010; color: #4ade80; border: 1px solid #166534; }
    .badge-scheduled { background: #0d1030; color: #818cf8; border: 1px solid #3730a3; }
    .badge-completed { background: #222; color: #888; border: 1px solid #444; }
    .badge-cancelled { background: #200000; color: #f87171; border: 1px solid #7f1d1d; }

    .step-dot { width: 10px; height: 10px; border-radius: 50%; transition: background 0.2s; }
    .step-dot.done    { background: #cc0000; }
    .step-dot.active  { background: #ff3333; box-shadow: 0 0 0 3px rgba(204,0,0,0.25); }
    .step-dot.pending { background: #333; }
    .step-line { height: 2px; width: 2rem; background: #2e2e2e; }

    .success-icon {
      width: 72px; height: 72px; border-radius: 50%;
      background: #cc0000; display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.5rem; font-size: 2rem;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* Logo mark SVG */
    .logo-mark { display: inline-flex; align-items: center; gap: 0.5rem; }
  </style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── CONFIG ─────────────────────────────────────────────────────────────────
// URL of your deployed Cloudflare Worker proxy (see proxy-worker.js for deploy steps)
// e.g. 'https://raven-sm8-proxy.yourname.workers.dev'
const PROXY_BASE = 'https://calm-fog-ef62.peter-c72.workers.dev';

// Only show jobs belonging to this client
const RAVEN_COMPANY_UUID = '11fa4f27-5ce1-465c-8677-2431c46bdc3b';

// How many days ahead to scan for available slots
const DAYS_AHEAD = 21;

// Technician for Raven Housing Reactive jobs
const RAVEN_STAFF = [
  '895bd1c7-ca11-42c3-9d8b-2067bb75b6fb', // Tommy Marshall
];

// Each Raven job takes 30 minutes. A half-day slot is available when Tommy
// has at least 30 mins free — i.e. booked < (window length − 0.5h)
// AM window = 5h (08:00–13:00) → busy if >= 4.5h booked
// PM window = 4.5h (13:00–17:30) → busy if >= 4.0h booked
const AM_BUSY_THRESHOLD_H = 4.5;
const PM_BUSY_THRESHOLD_H = 4.0;
// ─────────────────────────────────────────────────────────────────────────────

async function sm8Get(path) {
  const res = await fetch(PROXY_BASE + path, {
    headers: { 'Accept': 'application/json' },
  });
  if (!res.ok) throw new Error(`ServiceM8 error ${res.status}: ${await res.text()}`);
  return res.json();
}

async function sm8Put(path, body) {
  const res = await fetch(PROXY_BASE + path, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`ServiceM8 error ${res.status}: ${await res.text()}`);
  return res.json();
}

// Normalise a UK postcode — uppercase, strip all spaces, then re-insert canonical space
function normalisePostcode(raw) {
  const s = raw.replace(/\s/g, '').toUpperCase();
  if (s.length < 5) return s;
  return s.slice(0, -3) + ' ' + s.slice(-3);
}

function normalisePhone(raw) {
  return raw.replace(/[\s\-().+]/g, '');
}

// Match a job against the user's search terms
function jobMatches(job, { postcode, houseNumber, phone }) {
  const addr = (job.job_address || '').toLowerCase();
  const clientPhone = normalisePhone(job.contact_phone || '');

  if (phone) {
    const needle = normalisePhone(phone);
    if (clientPhone.includes(needle) || normalisePhone(job.contact_mobile || '').includes(needle)) return true;
  }

  if (postcode && houseNumber) {
    const normPC = normalisePostcode(postcode).toLowerCase();
    const normHN = houseNumber.trim().toLowerCase();
    return addr.includes(normPC) && addr.includes(normHN);
  }

  if (postcode) return addr.includes(normalisePostcode(postcode).toLowerCase());
  return false;
}

function statusLabel(status) {
  const map = {
    'Quote': 'Quote',
    'Work Order': 'Scheduled',
    'Completed': 'Completed',
    'Cancelled': 'Cancelled',
    'Unsuccessful': 'Unsuccessful',
  };
  return map[status] || status || 'Unknown';
}

function statusBadgeClass(status) {
  if (status === 'Work Order') return 'badge-scheduled';
  if (status === 'Completed')  return 'badge-completed';
  if (status === 'Cancelled' || status === 'Unsuccessful') return 'badge-cancelled';
  return 'badge-pending';
}

// Haversine distance between two lat/lng points in miles
function distanceMiles(lat1, lng1, lat2, lng2) {
  const R    = 3958.8;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a    = Math.sin(dLat / 2) ** 2
             + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180)
             * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// Fetch real availability from ServiceM8 diary.
// jobLat / jobLng — the customer's property coordinates.
// Only offers a slot if a technician is already working within NEARBY_MILES that day.
const NEARBY_MILES = 10;

// Always format dates in LOCAL time to avoid BST/UTC off-by-one
function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

async function fetchAvailability(jobLat, jobLng) {
  const today = new Date();
  const from  = new Date(today); from.setDate(today.getDate() + 1);
  const to    = new Date(today); to.setDate(today.getDate() + DAYS_AHEAD + 2);
  const fromStr = localDateStr(from);
  const toStr   = localDateStr(to);

  // Fetch activities + job coordinates in parallel
  const [activities, jobCoords] = await Promise.all([
    sm8Get(`/jobactivity.json?%24filter=start_date+gt+%27${fromStr}%27+and+start_date+lt+%27${toStr}%27+and+active+eq+1`),
    fetch(PROXY_BASE + '/job-coords').then(r => r.json()),
  ]);

  const staffSet = new Set(RAVEN_STAFF);
  const relevant = activities.filter(a =>
    staffSet.has(a.staff_uuid) &&
    a.activity_was_scheduled === 1 &&
    !a.activity_was_recorded
  );

  // For each date+staff: track booked hours AND whether they're working nearby
  // AM: 08:00–13:00  |  PM: 13:00–17:30
  const byDate = {}; // { date: { staffUuid: { am: hrs, pm: hrs, amNearby: bool, pmNearby: bool } } }

  for (const a of relevant) {
    const date  = a.start_date.slice(0, 10);
    const staff = a.staff_uuid;
    if (!byDate[date])        byDate[date]        = {};
    if (!byDate[date][staff]) byDate[date][staff] = { am: 0, pm: 0, amNearby: false, pmNearby: false };

    const s   = new Date(a.start_date.replace(' ', 'T'));
    const e   = new Date(a.end_date.replace(' ', 'T'));
    const hrs = (e - s) / 3600000;
    const pm  = s.getHours() >= 13;

    if (pm) byDate[date][staff].pm += hrs;
    else    byDate[date][staff].am += hrs;

    // Check proximity of the job this activity is for
    if (jobLat && jobLng) {
      const coords = jobCoords[a.job_uuid];
      if (coords) {
        const miles = distanceMiles(jobLat, jobLng, coords.lat, coords.lng);
        if (miles <= NEARBY_MILES) {
          if (pm) byDate[date][staff].pmNearby = true;
          else    byDate[date][staff].amNearby = true;
        }
      }
    }
  }

  // A slot is available if at least one technician is:
  //   a) under the busy threshold (has capacity), AND
  //   b) already working within 5 miles that half-day (or job has no coords — fallback)
  const hasCoordsForJob = jobLat && jobLng;

  const availability = {};
  const d = new Date(from);
  while (d <= to) {
    if (d.getDay() !== 0 && d.getDay() !== 6) {
      const key      = localDateStr(d);
      const staffDay = byDate[key] || {};
      let amFree = false, pmFree = false;

      for (const staffId of RAVEN_STAFF) {
        const s = staffDay[staffId] || { am: 0, pm: 0, amNearby: false, pmNearby: false };
        const amCapacity = s.am < AM_BUSY_THRESHOLD_H;
        const pmCapacity = s.pm < PM_BUSY_THRESHOLD_H;
        const amNear     = !hasCoordsForJob || s.amNearby;
        const pmNear     = !hasCoordsForJob || s.pmNearby;
        if (amCapacity && amNear) amFree = true;
        if (pmCapacity && pmNear) pmFree = true;
      }
      availability[key] = { am: amFree, pm: pmFree };
    }
    d.setDate(d.getDate() + 1);
  }
  return availability;
}

function fmt(date) {
  return date.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

function fmtShort(date) {
  return date.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
}

// ─── STEP COMPONENTS ─────────────────────────────────────────────────────────

function StepLookup({ onFound }) {
  const [mode, setMode]         = useState('address'); // 'address' | 'phone'
  const [postcode, setPostcode] = useState('');
  const [houseNo, setHouseNo]   = useState('');
  const [phone, setPhone]       = useState('');
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');

  async function handleSearch(e) {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      // ServiceM8 doesn't support OR — fetch Work Orders and Quotes separately then merge
      const base = `/job.json?%24filter=company_uuid%20eq%20%27${RAVEN_COMPANY_UUID}%27%20and%20status%20eq%20`;
      const [workOrders, quotes] = await Promise.all([
        sm8Get(base + `%27Work%20Order%27`),
        sm8Get(base + `%27Quote%27`),
      ]);
      const jobs = [...workOrders, ...quotes];
      const criteria = mode === 'phone'
        ? { phone }
        : { postcode, houseNumber: houseNo, phone: '' };

      const matched = jobs.filter(j => jobMatches(j, criteria));

      if (matched.length === 0) {
        setError('No upcoming jobs found for those details. Please check your information or call us on 01234 567890.');
      } else {
        onFound(matched);
      }
    } catch (err) {
      setError('Could not connect to our booking system. Please try again or call us.');
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="card rounded-xl p-8 w-full max-w-md mx-auto shadow-2xl">
      <div className="flex items-center gap-2 mb-1">
        <div className="w-1 h-6 bg-ig-red rounded-full"></div>
        <h2 className="text-xl font-bold tracking-tight">Find your appointment</h2>
      </div>
      <p className="text-sm text-ig-muted mb-6 pl-3">Enter your address details or phone number to look up your job.</p>

      <div className="flex gap-2 mb-6">
        <button className={`tab-btn ${mode === 'address' ? 'tab-active' : 'tab-inactive'}`} onClick={() => setMode('address')}>Address</button>
        <button className={`tab-btn ${mode === 'phone'   ? 'tab-active' : 'tab-inactive'}`} onClick={() => setMode('phone')}>Phone number</button>
      </div>

      <form onSubmit={handleSearch}>
        {mode === 'address' ? (
          <>
            <div className="mb-4">
              <label className="block text-xs font-semibold text-ig-muted uppercase tracking-wider mb-1.5">House number / name</label>
              <input className="input-field" placeholder="e.g. 14 or Rose Cottage" value={houseNo} onChange={e => setHouseNo(e.target.value)} required />
            </div>
            <div className="mb-6">
              <label className="block text-xs font-semibold text-ig-muted uppercase tracking-wider mb-1.5">Postcode</label>
              <input className="input-field" placeholder="e.g. RH1 1AB" value={postcode} onChange={e => setPostcode(e.target.value)} required />
            </div>
          </>
        ) : (
          <div className="mb-6">
            <label className="block text-xs font-semibold text-ig-muted uppercase tracking-wider mb-1.5">Phone number</label>
            <input className="input-field" type="tel" placeholder="e.g. 07700 900123" value={phone} onChange={e => setPhone(e.target.value)} required />
          </div>
        )}

        {error && <div className="mb-4 p-3 rounded bg-red-950 border border-red-800 text-red-300 text-sm">{error}</div>}

        <button className="btn-primary w-full" type="submit" disabled={loading}>
          {loading ? 'Searching…' : 'Find my appointment'}
        </button>
      </form>
    </div>
  );
}

function StepSelectJob({ jobs, onSelect, onBack }) {
  return (
    <div className="card rounded-xl p-8 w-full max-w-lg mx-auto shadow-2xl">
      <button className="text-xs font-semibold text-ig-muted hover:text-white mb-5 flex items-center gap-1 uppercase tracking-wider" onClick={onBack}>← Back</button>
      <div className="flex items-center gap-2 mb-1">
        <div className="w-1 h-6 bg-ig-red rounded-full"></div>
        <h2 className="text-xl font-bold tracking-tight">We found {jobs.length} job{jobs.length > 1 ? 's' : ''}</h2>
      </div>
      <p className="text-sm text-ig-muted mb-5 pl-3">Select the appointment you'd like to book.</p>
      <div className="space-y-3">
        {jobs.map(job => (
          <button key={job.uuid} className="w-full text-left slot-card" onClick={() => onSelect(job)}>
            <div className="flex items-start justify-between gap-3">
              <div className="min-w-0">
                <p className="font-bold text-sm truncate">{job.job_address || 'No address'}</p>
                <p className="text-xs text-ig-muted mt-0.5 truncate">{job.type || job.job_description || 'Job #' + job.generated_job_id}</p>
                {job.start_date && <p className="text-xs text-ig-muted mt-1">Ref: {job.generated_job_id}</p>}
              </div>
              <span className={`badge-status flex-shrink-0 ${statusBadgeClass(job.status)}`}>{statusLabel(job.status)}</span>
            </div>
          </button>
        ))}
      </div>
    </div>
  );
}

function StepJobDetail({ job, onBook, onBack }) {
  const canBook = job.status === 'Work Order' || job.status === 'Quote';
  return (
    <div className="card rounded-xl p-8 w-full max-w-lg mx-auto shadow-2xl">
      <button className="text-xs font-semibold text-ig-muted hover:text-white mb-5 flex items-center gap-1 uppercase tracking-wider" onClick={onBack}>← Back</button>
      <div className="flex items-start justify-between gap-3 mb-6">
        <div className="flex items-center gap-2">
          <div className="w-1 h-6 bg-ig-red rounded-full flex-shrink-0"></div>
          <h2 className="text-xl font-bold tracking-tight">Your appointment</h2>
        </div>
        <span className={`badge-status flex-shrink-0 ${statusBadgeClass(job.status)}`}>{statusLabel(job.status)}</span>
      </div>

      <div className="bg-black bg-opacity-40 rounded-lg p-4 mb-6 space-y-3">
        <Row label="Address"   value={job.job_address || '—'} />
        <Row label="Job type"  value={job.type || job.job_description || '—'} />
        <Row label="Reference" value={job.generated_job_id || job.uuid?.slice(0,8) || '—'} />
        {job.start_date && <Row label="Current date" value={new Date(job.start_date).toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long', year:'numeric' })} />}
        {job.start_time && <Row label="Time" value={job.start_time} />}
      </div>

      {canBook ? (
        <>
          <p className="text-sm text-ig-muted mb-4">Select an available time slot and we'll get your appointment booked in.</p>
          <button className="btn-primary w-full" onClick={onBook}>Choose a time slot →</button>
        </>
      ) : (
        <div className="p-3 rounded bg-zinc-900 border border-zinc-700 text-zinc-400 text-sm">
          This appointment is {statusLabel(job.status).toLowerCase()} and cannot be changed online.
          Please call us on <strong className="text-white">0808 109 8016</strong> if you need to make changes.
        </div>
      )}
    </div>
  );
}

function Row({ label, value }) {
  return (
    <div className="flex gap-3 text-sm">
      <dt className="text-ig-muted w-28 flex-shrink-0 font-medium">{label}</dt>
      <dd className="text-white font-semibold">{value}</dd>
    </div>
  );
}

function StepSelectSlot({ job, onConfirm, onBack }) {
  const [availability,  setAvailability]  = useState(null); // null = loading
  const [error,         setError]         = useState('');
  const [selectedDay,   setSelectedDay]   = useState(null);
  const [selectedSlot,  setSelectedSlot]  = useState(null);

  useEffect(() => {
    fetchAvailability(job.lat ? parseFloat(job.lat) : null, job.lng ? parseFloat(job.lng) : null)
      .then(setAvailability)
      .catch(e => { console.error(e); setError('Could not load available slots. Please try again.'); });
  }, []);

  const availDays = availability
    ? Object.entries(availability)
        .filter(([, v]) => v.am || v.pm)
        .map(([k]) => { const [y,m,d] = k.split('-'); return new Date(+y, +m-1, +d); })
        .sort((a, b) => a - b)
    : [];

  function handleDayClick(day) {
    setSelectedDay(day);
    setSelectedSlot(null);
  }

  function slotsForDay(day) {
    if (!availability) return [];
    const key = localDateStr(day);
    const avail = availability[key] || {};
    const slots = [];
    if (avail.am) slots.push({ label: 'Morning  08:00–13:00', start: '08:00', end: '13:00', period: 'AM' });
    if (avail.pm) slots.push({ label: 'Afternoon  13:00–17:30', start: '13:00', end: '17:30', period: 'PM' });
    return slots;
  }

  return (
    <div className="card rounded-xl p-8 w-full max-w-2xl mx-auto shadow-2xl">
      <button className="text-xs font-semibold text-ig-muted hover:text-white mb-5 flex items-center gap-1 uppercase tracking-wider" onClick={onBack}>← Back</button>
      <div className="flex items-center gap-2 mb-1">
        <div className="w-1 h-6 bg-ig-red rounded-full"></div>
        <h2 className="text-xl font-bold tracking-tight">Choose a time slot</h2>
      </div>
      <p className="text-sm text-ig-muted mb-6 pl-3">Live availability based on your engineer's diary.</p>

      {error && <div className="mb-4 p-3 rounded bg-red-950 border border-red-800 text-red-300 text-sm">{error}</div>}

      {!availability && !error && (
        <div className="flex items-center gap-3 text-ig-muted text-sm py-10 justify-center">
          <svg className="animate-spin h-5 w-5 text-ig-red" viewBox="0 0 24 24" fill="none">
            <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
            <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          Checking engineer availability…
        </div>
      )}

      {availDays.length > 0 && (
        <>
          <p className="text-xs font-semibold text-ig-muted uppercase tracking-wider mb-3">Select a date</p>
          <div className="grid grid-cols-3 sm:grid-cols-5 gap-2 mb-6">
            {availDays.map((d, i) => {
              const active = selectedDay && d.toDateString() === selectedDay.toDateString();
              return (
                <button key={i} className={`slot-card text-center py-3 px-1 ${active ? 'selected' : ''}`} onClick={() => handleDayClick(d)}>
                  <div className="text-xs text-ig-muted font-semibold uppercase">{d.toLocaleDateString('en-GB', { weekday:'short' })}</div>
                  <div className="font-extrabold text-xl leading-tight mt-0.5">{d.getDate()}</div>
                  <div className="text-xs text-ig-muted">{d.toLocaleDateString('en-GB', { month:'short' })}</div>
                </button>
              );
            })}
          </div>
        </>
      )}

      {availability && availDays.length === 0 && (
        <div className="p-4 rounded bg-zinc-900 border border-zinc-700 text-zinc-400 text-sm">
          No available slots in the next {DAYS_AHEAD} days. Call us on <strong className="text-white">0808 109 8016</strong> to arrange an appointment.
        </div>
      )}

      {selectedDay && (
        <>
          <p className="text-xs font-semibold text-ig-muted uppercase tracking-wider mb-3">Select a time — {fmtShort(selectedDay)}</p>
          <div className="grid grid-cols-2 gap-3 mb-6">
            {slotsForDay(selectedDay).map((slot, i) => {
              const active = selectedSlot && selectedSlot.period === slot.period;
              return (
                <button key={i} className={`slot-card text-center py-5 ${active ? 'selected' : ''}`} onClick={() => setSelectedSlot(slot)}>
                  <div className="font-extrabold text-base">{slot.period === 'AM' ? 'Morning' : 'Afternoon'}</div>
                  <div className="text-xs text-ig-muted mt-1 font-semibold">{slot.label.split('  ')[1]}</div>
                </button>
              );
            })}
          </div>
        </>
      )}

      {selectedDay && selectedSlot && (
        <div className="p-4 rounded bg-red-950 border border-ig-red mb-5 text-sm flex items-center gap-2">
          <div className="w-2 h-2 rounded-full bg-ig-red flex-shrink-0"></div>
          <span className="text-white font-semibold">{fmt(selectedDay)}, {selectedSlot.label.split('  ')[1]}</span>
        </div>
      )}

      <button className="btn-primary w-full" disabled={!selectedDay || !selectedSlot} onClick={() => onConfirm({ day: selectedDay, slot: selectedSlot })}>
        Confirm this slot →
      </button>
    </div>
  );
}

function StepConfirm({ job, day, slot, onDone, onBack }) {
  const [loading, setLoading] = useState(false);
  const [error,   setError]   = useState('');

  async function handleConfirm() {
    setLoading(true);
    setError('');
    try {
      // Format date as YYYY-MM-DD for ServiceM8
      const yyyy = day.getFullYear();
      const mm   = String(day.getMonth() + 1).padStart(2, '0');
      const dd   = String(day.getDate()).padStart(2, '0');
      const dateStr = `${yyyy}-${mm}-${dd}`;

      await sm8Put(`/job/${job.uuid}.json`, {
        start_date: dateStr,
        start_time: slot.start + ':00',
        end_time:   slot.end   + ':00',
        // Optionally set status to Work Order if it was a Quote
        ...(job.status === 'Quote' ? { status: 'Work Order' } : {}),
      });
      onDone();
    } catch (err) {
      setError('We couldn\'t update your appointment. Please call us to confirm your slot.');
      console.error(err);
    } finally {
      setLoading(false);
    }
  }

  return (
    <div className="card rounded-xl p-8 w-full max-w-md mx-auto shadow-2xl">
      <button className="text-xs font-semibold text-ig-muted hover:text-white mb-5 flex items-center gap-1 uppercase tracking-wider" onClick={onBack}>← Back</button>
      <div className="flex items-center gap-2 mb-6">
        <div className="w-1 h-6 bg-ig-red rounded-full"></div>
        <h2 className="text-xl font-bold tracking-tight">Confirm your booking</h2>
      </div>

      <div className="bg-black bg-opacity-40 rounded-lg p-4 mb-6 space-y-3">
        <Row label="Address"  value={job.job_address || '—'} />
        <Row label="Job type" value={job.type || job.job_description || '—'} />
        <Row label="Date"     value={fmt(day)} />
        <Row label="Time"     value={slot.label.split('  ')[1] || slot.label} />
      </div>

      <p className="text-xs text-ig-muted mb-5 leading-relaxed">
        By confirming you are requesting this time slot. Our team will be in touch if any changes are needed.
      </p>

      {error && <div className="mb-4 p-3 rounded bg-red-950 border border-red-800 text-red-300 text-sm">{error}</div>}

      <button className="btn-primary w-full" onClick={handleConfirm} disabled={loading}>
        {loading ? 'Saving…' : 'Confirm booking'}
      </button>
    </div>
  );
}

function StepSuccess({ job, day, slot }) {
  return (
    <div className="card rounded-xl p-10 w-full max-w-md mx-auto shadow-2xl text-center">
      <div className="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" width="32" height="32">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2 className="text-2xl font-extrabold mb-2 tracking-tight">Booking Confirmed</h2>
      <p className="text-ig-muted text-sm mb-6 leading-relaxed">
        Your appointment request has been submitted. Our team will be in touch to confirm.
      </p>
      <div className="bg-black bg-opacity-40 rounded-lg p-4 mb-6 space-y-3 text-left">
        <Row label="Address" value={job.job_address || '—'} />
        <Row label="Date"    value={fmt(day)} />
        <Row label="Time"    value={slot.label.split('  ')[1] || slot.label} />
      </div>
      <div className="border-t border-ig-border pt-5">
        <p className="text-xs text-ig-muted mb-3">Need to make a change?</p>
        <a href="tel:08081098016" className="btn-outline inline-block text-sm">Call 0808 109 8016</a>
      </div>
    </div>
  );
}

          alt="Integrum Services"
          style={{height:'44px', width:'auto', objectFit:'contain'}}
        />

        {/* Centre label — hidden on mobile */}
        <div className="hidden sm:flex flex-col items-center gap-0.5">
          <span className="text-xs text-ig-muted font-semibold uppercase tracking-widest">Appointment Booking</span>
          <span className="text-xs text-ig-muted">on behalf of</span>
        </div>

        {/* Raven Housing logo */}
        <div className="flex items-center gap-3">
          <img
            src="https://www.ravenht.org.uk/wp-content/themes/cis-raventheme/assets/img/A-UdCbGa_400x400.jpg"
            alt="Raven Housing"
            style={{height:'44px', width:'44px', objectFit:'contain', borderRadius:'6px', background:'#fff', padding:'3px'}}
          />
          <div className="hidden sm:block">
            <div className="text-xs font-bold text-white leading-tight">Raven Housing</div>
            <a href="tel:08081098016" className="text-xs text-ig-red font-semibold hover:underline">0808 109 8016</a>
          </div>
        </div>
      </header>

      {/* Progress steps */}
      {step !== 'success' && (
        <div className="bg-black border-b border-ig-border px-6 py-3 flex items-center justify-center gap-3">
          {[
            { key: 'lookup',       label: 'Find job' },
            { key: 'job-detail',   label: 'Review' },
            { key: 'select-slot',  label: 'Choose slot' },
            { key: 'confirm',      label: 'Confirm' },
          ].map((s, i) => {
            const ORDER = ['lookup','select-job','job-detail','select-slot','confirm','success'];
            const current = ORDER.indexOf(step);
            const mine    = ORDER.indexOf(s.key);
            const done    = current > mine;
            const active  = step === s.key || (s.key === 'lookup' && step === 'select-job') || (s.key === 'job-detail' && step === 'select-job');
            return (
              <div key={s.key} className="flex items-center gap-3">
                <div className="flex items-center gap-2">
                  <div className={`step-dot ${done ? 'done' : active ? 'active' : 'pending'}`} />
                  <span className={`text-xs font-semibold hidden sm:inline ${active ? 'text-white' : done ? 'text-ig-red' : 'text-ig-muted'}`}>{s.label}</span>
                </div>
                {i < 3 && <div className="step-line" />}
              </div>
            );
          })}
        </div>
      )}

      {/* Main content */}
      <main className="flex-1 flex items-start justify-center px-4 py-6">
        {step === 'lookup' && (
          <StepLookup
            onFound={found => {
              setJobs(found);
              if (found.length === 1) {
                setJob(found[0]);
                setStep('job-detail');
              } else {
                setStep('select-job');
              }
            }}
          />
        )}

        {step === 'select-job' && (
          <StepSelectJob
            jobs={jobs}
            onSelect={j => { setJob(j); setStep('job-detail'); }}
            onBack={() => setStep('lookup')}
          />
        )}

        {step === 'job-detail' && (
          <StepJobDetail
            job={job}
            onBook={() => setStep('select-slot')}
            onBack={() => jobs.length > 1 ? setStep('select-job') : setStep('lookup')}
          />
        )}

        {step === 'select-slot' && (
          <StepSelectSlot
            job={job}
            onConfirm={({ day, slot }) => { setBooking({ day, slot }); setStep('confirm'); }}
            onBack={() => setStep('job-detail')}
          />
        )}

        {step === 'confirm' && (
          <StepConfirm
            job={job}
            day={booking.day}
            slot={booking.slot}
            onDone={() => setStep('success')}
            onBack={() => setStep('select-slot')}
          />
        )}

        {step === 'success' && (
          <StepSuccess job={job} day={booking.day} slot={booking.slot} />
        )}
      </main>

      <footer className="bg-black border-t border-ig-border px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-2">
        <div className="flex items-center gap-2">
          <div className="w-2 h-2 rounded-full bg-ig-red"></div>
          <span className="text-xs text-ig-muted">© Integrum Services Ltd · integrumservices.co.uk</span>
        </div>
        <span className="text-xs text-ig-muted">
          Need help? Call <a href="tel:08081098016" className="text-white font-semibold hover:text-ig-red transition-colors">0808 109 8016</a>
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
